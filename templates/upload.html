<!DOCTYPE html>
<html>

<head>
    <title>Upload Resume</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        button {
            padding: 10px 20px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <div class="box">

        <h2>Upload Resume</h2>

        <form method="post" enctype="multipart/form-data">

            <input type="file" name="resume" required>

            <br><br>

            <button type="submit">Analyze Resume</button>

        </form>

    </div>

</body>

</html>
